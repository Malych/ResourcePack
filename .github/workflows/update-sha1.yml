name: Update SHA1 Checksums

on:
  push:
    paths:
      - '**.zip'

jobs:
  update-sha1:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Sync SHA1 sidecars
        shell: bash
        run: |
          shopt -s nullglob
          for f in *.sha1; do
            [[ -f "${f%.sha1}" ]] || rm "$f"
          done
          for f in *.zip; do
            sha1sum "$f" | awk '{print $1}' > "$f.sha1"
          done

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- '*.sha1'
          git diff --staged --quiet || (git commit -m "Update SHA1 sidecars" && git push)
